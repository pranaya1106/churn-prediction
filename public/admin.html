<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Dashboard — Churn Feedback</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 40px 20px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    h1 {
      font-size: 26px;
      margin-bottom: 6px;
      color: #f8fafc;
    }

    p.subtitle {
      color: #94a3b8;
      margin-bottom: 24px;
      font-size: 14px;
    }

    .stats {
      display: flex;
      gap: 16px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 16px 24px;
      flex: 1;
      text-align: center;
    }

    .stat-card .number {
      font-size: 28px;
      font-weight: 700;
      color: #f8fafc;
    }

    .stat-card .label {
      font-size: 12px;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 4px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #1e293b;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid #334155;
    }

    th {
      background: #334155;
      padding: 12px 16px;
      text-align: left;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #94a3b8;
    }

    td {
      padding: 12px 16px;
      font-size: 14px;
      border-top: 1px solid #334155;
    }

    tr:hover { background: #263348; }

    .prob-high {
      color: #ef4444;
      font-weight: 600;
    }

    .prob-mid {
      color: #f59e0b;
      font-weight: 600;
    }

    .empty-msg {
      text-align: center;
      color: #64748b;
      padding: 40px;
      font-size: 15px;
    }

    .back-link {
      display: inline-block;
      margin-bottom: 24px;
      color: #6366f1;
      text-decoration: none;
      font-size: 14px;
    }

    .back-link:hover { text-decoration: underline; }

    .charts {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 24px;
    }

    .chart-card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 20px;
    }

    .chart-card h3 {
      font-size: 14px;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 16px;
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="container">
    <a class="back-link" href="/">&larr; Back to Prediction</a>
    <h1>Admin Dashboard</h1>
    <p class="subtitle">Feedback from high-risk churn customers</p>

    <div class="stats">
      <div class="stat-card">
        <div class="number" id="totalCount">-</div>
        <div class="label">Total Feedback</div>
      </div>
      <div class="stat-card">
        <div class="number" id="avgProb">-</div>
        <div class="label">Avg Churn Probability</div>
      </div>
      <div class="stat-card">
        <div class="number" id="topReason">-</div>
        <div class="label">Top Reason</div>
      </div>
    </div>

    <div class="charts">
      <div class="chart-card">
        <h3>Feedback by Reason</h3>
        <canvas id="reasonChart"></canvas>
      </div>
      <div class="chart-card">
        <h3>Churn Probability Distribution</h3>
        <canvas id="probChart"></canvas>
      </div>
    </div>

    <table>
      <thead>
        <tr>
          <th>Email</th>
          <th>Churn %</th>
          <th>Reason</th>
          <th>Message</th>
          <th>Date</th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <tr><td colspan="5" class="empty-msg">Loading...</td></tr>
      </tbody>
    </table>
  </div>

  <script>
    async function loadData() {
      try {
        const res = await fetch('/admin-data');
        const data = await res.json();
        const tbody = document.getElementById('tableBody');

        // Stats
        document.getElementById('totalCount').textContent = data.length;

        if (data.length === 0) {
          tbody.innerHTML = '<tr><td colspan="5" class="empty-msg">No feedback yet</td></tr>';
          document.getElementById('avgProb').textContent = '-';
          document.getElementById('topReason').textContent = '-';
          return;
        }

        const avg = data.reduce((sum, r) => sum + Number(r.churn_probability), 0) / data.length;
        document.getElementById('avgProb').textContent = avg.toFixed(1) + '%';

        // Top reason
        const counts = {};
        data.forEach(r => { counts[r.reason] = (counts[r.reason] || 0) + 1; });
        const topReason = Object.entries(counts).sort((a, b) => b[1] - a[1])[0][0];
        document.getElementById('topReason').textContent = topReason;

        // Table rows
        tbody.innerHTML = data.map(row => `
          <tr>
            <td>${row.email || '-'}</td>
            <td class="${Number(row.churn_probability) > 80 ? 'prob-high' : 'prob-mid'}">
              ${row.churn_probability}%
            </td>
            <td>${row.reason || '-'}</td>
            <td>${row.message || '-'}</td>
            <td>${new Date(row.created_at).toLocaleDateString()}</td>
          </tr>
        `).join('');

        // --- Reason Doughnut Chart ---
        const reasonLabels = Object.keys(counts);
        const reasonValues = Object.values(counts);
        const reasonColors = ['#6366f1', '#f59e0b', '#ef4444', '#22c55e'];

        new Chart(document.getElementById('reasonChart'), {
          type: 'doughnut',
          data: {
            labels: reasonLabels,
            datasets: [{
              data: reasonValues,
              backgroundColor: reasonColors,
              borderColor: '#1e293b',
              borderWidth: 3,
            }]
          },
          options: {
            plugins: {
              legend: { position: 'bottom', labels: { color: '#94a3b8', padding: 12 } }
            }
          }
        });

        // --- Probability Bar Chart ---
        const ranges = { '60-70%': 0, '70-80%': 0, '80-90%': 0, '90-100%': 0 };
        data.forEach(r => {
          const p = Number(r.churn_probability);
          if (p <= 70) ranges['60-70%']++;
          else if (p <= 80) ranges['70-80%']++;
          else if (p <= 90) ranges['80-90%']++;
          else ranges['90-100%']++;
        });

        new Chart(document.getElementById('probChart'), {
          type: 'bar',
          data: {
            labels: Object.keys(ranges),
            datasets: [{
              label: 'Customers',
              data: Object.values(ranges),
              backgroundColor: ['#22c55e', '#f59e0b', '#f97316', '#ef4444'],
              borderRadius: 6,
            }]
          },
          options: {
            plugins: { legend: { display: false } },
            scales: {
              x: { ticks: { color: '#94a3b8' }, grid: { display: false } },
              y: { ticks: { color: '#94a3b8', stepSize: 1 }, grid: { color: '#334155' } }
            }
          }
        });

      } catch {
        document.getElementById('tableBody').innerHTML =
          '<tr><td colspan="5" class="empty-msg">Failed to load data</td></tr>';
      }
    }

    loadData();
  </script>

</body>
</html>
