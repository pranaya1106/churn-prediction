<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Customer Churn Prediction</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
      color: #f8fafc;
    }

    p.subtitle {
      color: #94a3b8;
      margin-bottom: 32px;
      font-size: 15px;
    }

    .card {
      background: #1e293b;
      border-radius: 16px;
      padding: 32px;
      width: 100%;
      max-width: 600px;
      border: 1px solid #334155;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    label {
      font-size: 13px;
      color: #94a3b8;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input, select {
      background: #0f172a;
      border: 1px solid #334155;
      color: #f1f5f9;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      transition: border 0.2s;
    }

    input:focus, select:focus {
      border-color: #6366f1;
    }

    select option {
      background: #1e293b;
    }

    button {
      margin-top: 24px;
      width: 100%;
      padding: 14px;
      background: #6366f1;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover { background: #4f46e5; }
    button:disabled { background: #475569; cursor: not-allowed; }

    .result {
      margin-top: 24px;
      padding: 20px;
      border-radius: 12px;
      text-align: center;
      display: none;
    }

    .result.churn {
      background: #450a0a;
      border: 1px solid #ef4444;
    }

    .result.no-churn {
      background: #052e16;
      border: 1px solid #22c55e;
    }

    .result .label {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 6px;
      color: #94a3b8;
    }

    .result .verdict {
      font-size: 26px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .result.churn .verdict { color: #ef4444; }
    .result.no-churn .verdict { color: #22c55e; }

    .result .prob {
      font-size: 14px;
      color: #94a3b8;
    }

    .feedback-form {
      margin-top: 20px;
      padding: 20px;
      background: #1a1a2e;
      border: 1px solid #f59e0b;
      border-radius: 12px;
      display: none;
    }

    .feedback-form h3 {
      font-size: 16px;
      color: #f59e0b;
      margin-bottom: 14px;
    }

    .feedback-form .field { margin-bottom: 12px; }

    .feedback-form textarea {
      background: #0f172a;
      border: 1px solid #334155;
      color: #f1f5f9;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      width: 100%;
      resize: vertical;
      min-height: 60px;
    }

    .feedback-form textarea:focus { border-color: #6366f1; }

    .feedback-btn {
      margin-top: 12px;
      width: 100%;
      padding: 12px;
      background: #f59e0b;
      color: #0f172a;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }

    .feedback-btn:hover { background: #d97706; }

    .feedback-success {
      margin-top: 12px;
      padding: 12px;
      background: #052e16;
      border: 1px solid #22c55e;
      border-radius: 8px;
      color: #22c55e;
      font-size: 14px;
      text-align: center;
      display: none;
    }

    .error {
      margin-top: 16px;
      padding: 12px 16px;
      background: #450a0a;
      border: 1px solid #ef4444;
      border-radius: 8px;
      font-size: 13px;
      color: #fca5a5;
      display: none;
    }
  </style>
</head>
<body>

  <h1>Customer Churn Prediction</h1>
  <p class="subtitle">Enter customer details to predict churn probability</p>

  <div class="card">
    <form id="predictForm">
      <div class="grid">

        <div class="field">
          <label>Email</label>
          <input type="email" name="email" placeholder="Enter your email" required />
        </div>

        <div class="field">
          <label>Tenure (months)</label>
          <input type="number" name="tenure" placeholder="e.g. 12" min="0" required />
        </div>

        <div class="field">
          <label>Monthly Charges ($)</label>
          <input type="number" name="monthly_charges" placeholder="e.g. 65.5" step="0.01" min="0" required />
        </div>

        <div class="field">
          <label>Total Charges ($)</label>
          <input type="number" name="total_charges" placeholder="e.g. 786" step="0.01" min="0" required />
        </div>

        <div class="field">
          <label>Contract</label>
          <select name="contract">
            <option value="Month-to-month">Month-to-month</option>
            <option value="One year">One year</option>
            <option value="Two year">Two year</option>
          </select>
        </div>

        <div class="field">
          <label>Internet Service</label>
          <select name="internet_service">
            <option value="Fiber optic">Fiber optic</option>
            <option value="DSL">DSL</option>
            <option value="No">No</option>
          </select>
        </div>

        <div class="field">
          <label>Tech Support</label>
          <select name="tech_support">
            <option value="No">No</option>
            <option value="Yes">Yes</option>
          </select>
        </div>

        <div class="field">
          <label>Payment Method</label>
          <select name="payment_method">
            <option value="Electronic check">Electronic check</option>
            <option value="Mailed check">Mailed check</option>
            <option value="Bank transfer (automatic)">Bank transfer</option>
            <option value="Credit card (automatic)">Credit card</option>
          </select>
        </div>

      </div>

      <button type="submit" id="submitBtn">Predict Churn</button>
    </form>

    <div class="result" id="result">
      <div class="label">Prediction Result</div>
      <div class="verdict" id="verdict"></div>
      <div class="prob" id="prob"></div>
    </div>

    <div class="error" id="errorBox"></div>

    <div class="feedback-form" id="feedbackForm">
      <h3>High Risk Detected — Share Your Feedback</h3>
      <div class="field">
        <label>Email</label>
        <input type="email" id="fbEmail" readonly />
      </div>
      <div class="field">
        <label>Reason</label>
        <select id="fbReason">
          <option value="High price">High price</option>
          <option value="Poor service">Poor service</option>
          <option value="Switching provider">Switching provider</option>
          <option value="Other">Other</option>
        </select>
      </div>
      <div class="field">
        <label>Message (optional)</label>
        <textarea id="fbMessage" placeholder="Tell us more..."></textarea>
      </div>
      <button class="feedback-btn" id="fbSubmit">Submit Feedback</button>
      <div class="feedback-success" id="fbSuccess">Feedback submitted. Thank you!</div>
    </div>
  </div>

  <script>
    document.getElementById('predictForm').addEventListener('submit', async function(e) {
      e.preventDefault();

      const btn = document.getElementById('submitBtn');
      const result = document.getElementById('result');
      const errorBox = document.getElementById('errorBox');
      const feedbackForm = document.getElementById('feedbackForm');
      const fbSuccess = document.getElementById('fbSuccess');

      btn.disabled = true;
      btn.textContent = 'Predicting...';
      result.style.display = 'none';
      errorBox.style.display = 'none';
      feedbackForm.style.display = 'none';
      fbSuccess.style.display = 'none';

      const formData = new FormData(this);
      const body = {
        email:           formData.get('email'),
        tenure:          Number(formData.get('tenure')),
        monthly_charges: Number(formData.get('monthly_charges')),
        total_charges:   Number(formData.get('total_charges')),
        contract:        formData.get('contract'),
        internet_service: formData.get('internet_service'),
        tech_support:    formData.get('tech_support'),
        payment_method:  formData.get('payment_method'),
      };

      try {
        const res = await fetch('http://localhost:3000/predict', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });

        const data = await res.json();

        const willChurn = data.churn_prediction;
        result.className = 'result ' + (willChurn ? 'churn' : 'no-churn');
        document.getElementById('verdict').textContent = willChurn ? 'Likely to Churn' : 'Not Likely to Churn';
        document.getElementById('prob').textContent = `Churn Probability: ${data.churn_probability}%`;
        result.style.display = 'block';

        // Show feedback form if high risk (> 60%)
        if (data.churn_probability > 60) {
          document.getElementById('fbEmail').value = body.email;
          document.getElementById('fbEmail').dataset.prob = data.churn_probability;
          feedbackForm.style.display = 'block';
        }

      } catch (err) {
        errorBox.textContent = 'Failed to connect to server. Make sure the server is running.';
        errorBox.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Predict Churn';
      }
    });

    // Feedback submit
    document.getElementById('fbSubmit').addEventListener('click', async function() {
      const btn = this;
      btn.disabled = true;
      btn.textContent = 'Submitting...';

      const fbBody = {
        email: document.getElementById('fbEmail').value,
        reason: document.getElementById('fbReason').value,
        message: document.getElementById('fbMessage').value,
        churn_probability: Number(document.getElementById('fbEmail').dataset.prob),
      };

      try {
        await fetch('http://localhost:3000/feedback', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(fbBody)
        });
        document.getElementById('fbSuccess').style.display = 'block';
        btn.style.display = 'none';
      } catch {
        alert('Failed to submit feedback');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Submit Feedback';
      }
    });
  </script>

</body>
</html>
